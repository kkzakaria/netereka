name: Rollback

on:
  workflow_dispatch:
    inputs:
      version_id:
        description: "Cloudflare Worker Version ID to rollback to"
        required: true
      reason:
        description: "Reason for rollback (short, appears in audit trail)"
        required: true

jobs:
  rollback:
    name: Rollback Cloudflare Worker to specified version
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      # User inputs are routed through env vars rather than interpolated into
      # the shell script, so a value like `evil"; rm -rf /; "` cannot inject
      # commands. Bash sees only `"$VERSION_ID"` etc., never the raw input.
      - name: Rollback
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          VERSION_ID: ${{ github.event.inputs.version_id }}
          REASON: ${{ github.event.inputs.reason }}
          ACTOR: ${{ github.actor }}
        run: |
          npx wrangler rollback \
            --version-id "$VERSION_ID" \
            --message "Rollback by $ACTOR: $REASON"

      - name: Create post-rollback investigation issue
        uses: actions/github-script@v7
        env:
          VERSION_ID: ${{ github.event.inputs.version_id }}
          REASON: ${{ github.event.inputs.reason }}
        with:
          # Same defensive pattern: read inputs from process.env in JS land
          # rather than templating them into the script body.
          script: |
            const versionId = process.env.VERSION_ID;
            const reason = process.env.REASON;
            const actor = context.actor;
            const body = [
              `**Rollback executed** to version \`${versionId}\`.`,
              ``,
              `- Triggered by : @${actor}`,
              `- Reason : ${reason}`,
              `- Timestamp : ${new Date().toISOString()}`,
              ``,
              `## Checklist`,
              ``,
              `- [ ] Identify root cause`,
              `- [ ] Open fix PR`,
              `- [ ] Verify expand/contract discipline was respected (no DB inconsistency)`,
              `- [ ] Close this issue when resolved`,
            ].join("\n");
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Post-rollback investigation — ${new Date().toISOString().slice(0, 10)}`,
              body,
              labels: ["release-pipeline", "post-rollback"],
            });
