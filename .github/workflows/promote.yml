name: Promote to 100%

on:
  workflow_dispatch:
    inputs:
      version_id:
        description: "Cloudflare Worker Version ID (empty = auto-detect latest non-100%)"
        required: false
        default: ""

jobs:
  promote:
    name: Promote version to 100% of traffic
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Resolve target version_id
        id: resolve
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          INPUT_VERSION_ID: ${{ github.event.inputs.version_id }}
        run: |
          if [ -n "$INPUT_VERSION_ID" ]; then
            echo "version_id=$INPUT_VERSION_ID" >> "$GITHUB_OUTPUT"
          else
            # Pick the version actively in the current canary split
            # (0 < percentage < 100). We must NOT use `wrangler versions list`
            # here because that includes uploaded-but-never-deployed versions
            # whose `deployed_percentage` defaults to 0 — auto-promoting one of
            # those would bypass canary entirely and route 100% of traffic to
            # an untested version.
            # `wrangler deployments list --json` returns ASCENDING order
            # (oldest first), so `.[0]` is the oldest deployment — never the
            # current canary. Sort by created_on desc and take the most recent
            # deployment, then pick the version in the canary split.
            VID=$(npx wrangler deployments list --json \
              | jq -r 'sort_by(.created_on) | reverse | .[0].versions
                       | map(select((.percentage // 0) > 0 and (.percentage // 0) < 100))
                       | first
                       | .version_id')
            if [ -z "$VID" ] || [ "$VID" = "null" ]; then
              echo "ERROR: no canary version (0 < % < 100) found to promote." \
                   "If you want to deploy a fresh version, use deploy.yml first."
              exit 1
            fi
            echo "version_id=$VID" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy at 100%
        run: |
          npx wrangler versions deploy "${{ steps.resolve.outputs.version_id }}@100%" --yes
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Seed hero LCP preload KV
        run: node scripts/seed-hero-preload.js
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          NEXT_PUBLIC_R2_URL: ${{ vars.NEXT_PUBLIC_R2_URL }}

      - name: Close pending-promotion issues
        uses: actions/github-script@v7
        with:
          script: |
            const versionId = "${{ steps.resolve.outputs.version_id }}";
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: "pending-promotion",
              state: "open",
            });
            for (const issue of issues.data) {
              if (issue.body && issue.body.includes(versionId)) {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  body: `Promoted to 100% by @${context.actor}.`,
                });
                await github.rest.issues.update({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  state: "closed",
                });
              }
            }
