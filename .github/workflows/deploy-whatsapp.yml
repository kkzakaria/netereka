name: Deploy WhatsApp Worker

on:
  push:
    branches: [main]
    paths:
      - "workers/whatsapp/**"
      - ".github/workflows/deploy-whatsapp.yml"
  workflow_dispatch:

concurrency:
  group: deploy-whatsapp
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy WhatsApp Worker to Cloudflare
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      # The root package.json installs @opennextjs/cloudflare for the main
      # storefront worker. Wrangler auto-detects OpenNext when it finds
      # (next.config.*, open-next.config.*, @opennextjs/cloudflare) at the
      # project root, and intercepts `wrangler deploy` to call
      # `opennextjs-cloudflare deploy` instead — which looks for a compiled
      # `.open-next/worker.js` that doesn't exist for this Worker.
      # OPEN_NEXT_DEPLOY=1 short-circuits that delegation (wrangler's
      # `getOpenNextDeployFromEnv()` reads it) so the WhatsApp worker deploys
      # as a plain wrangler Worker, which is what we want.
      - name: Deploy
        run: npx wrangler deploy --config workers/whatsapp/wrangler.jsonc
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          OPEN_NEXT_DEPLOY: "1"

      # Meta's webhook endpoint must respond to HEAD/GET. A successful deploy
      # should answer 200 (verify callback handler) or 405 (method not allowed
      # if only POST is implemented for that route) — both indicate the Worker
      # is alive. Anything else (5xx, timeout, DNS failure) is a regression.
      - name: Smoke check — webhook responds
        env:
          WHATSAPP_WORKER_URL: ${{ vars.WHATSAPP_WORKER_URL }}
        run: |
          if [ -z "$WHATSAPP_WORKER_URL" ]; then
            echo "⚠  WHATSAPP_WORKER_URL repo variable not set, skipping smoke check."
            echo "   Configure it in Settings → Secrets and variables → Actions → Variables."
            exit 0
          fi
          # Retry 3 times with backoff — Cloudflare edge propagation can take a few seconds.
          # Hard timeouts (connect 5s, total 10s) prevent a hung connection from burning the
          # whole GitHub Actions runtime before the retries kick in. Strip any trailing slash
          # from the URL so `<url>/webhook` stays well-formed regardless of how the variable
          # is set in repo settings.
          for i in 1 2 3; do
            CODE=$(curl -sS -o /dev/null -w "%{http_code}" \
              --connect-timeout 5 \
              --max-time 10 \
              -X HEAD "${WHATSAPP_WORKER_URL%/}/webhook" || echo "000")
            if [ "$CODE" = "200" ] || [ "$CODE" = "405" ]; then
              echo "✅ Smoke check OK (HTTP $CODE)"
              exit 0
            fi
            echo "Attempt $i: HTTP $CODE, retrying in 5s..."
            sleep 5
          done
          echo "❌ Smoke check failed after 3 attempts"
          exit 1
